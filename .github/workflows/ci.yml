name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Lint
        run: yarn lint

  firestore_rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Firestore Rules Tests
        run: yarn test:rules

  unit_tests:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Test
        run: yarn test

  coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Test with coverage
        run: yarn test:coverage

      - name: Build coverage comment body
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const summaryPath = 'coverage/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            throw new Error(`Coverage summary not found at ${summaryPath}`);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const total = summary.total;

          const line = (metric) => {
            const item = total[metric];
            return `| ${metric} | ${item.pct}% | ${item.covered} / ${item.total} |`;
          };

          const body = [
            '## Coverage Report',
            '',
            '| Metric | Coverage | Covered / Total |',
            '| --- | ---: | ---: |',
            line('lines'),
            line('statements'),
            line('functions'),
            line('branches'),
            '',
            '_Generated by CI from `yarn test:coverage`._',
          ].join('\n');

          fs.writeFileSync('coverage-comment.md', `${body}\n`);
          NODE

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: coverage-comment.md

  build:
    runs-on: ubuntu-latest
    needs: [lint, firestore_rules, unit_tests, coverage]
    if: >-
      always() &&
      needs.lint.result == 'success' &&
      needs.firestore_rules.result == 'success' &&
      (needs.unit_tests.result == 'success' || needs.unit_tests.result == 'skipped') &&
      (needs.coverage.result == 'success' || needs.coverage.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Build
        run: yarn build
