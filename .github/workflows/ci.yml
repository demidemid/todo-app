name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.3.0 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test
        if: github.event_name != 'pull_request'
        run: yarn test

      - name: Test with coverage
        if: github.event_name == 'pull_request'
        run: yarn test:coverage

      - name: Build coverage comment body
        if: github.event_name == 'pull_request'
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const summaryPath = 'coverage/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            throw new Error(`Coverage summary not found at ${summaryPath}`);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const total = summary.total;

          const line = (metric) => {
            const item = total[metric];
            return `| ${metric} | ${item.pct}% | ${item.covered} / ${item.total} |`;
          };

          const body = [
            '## Coverage Report',
            '',
            '| Metric | Coverage | Covered / Total |',
            '| --- | ---: | ---: |',
            line('lines'),
            line('statements'),
            line('functions'),
            line('branches'),
            '',
            '_Generated by CI from `yarn test:coverage`._',
          ].join('\n');

          fs.writeFileSync('coverage-comment.md', `${body}\n`);
          NODE

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: coverage-comment.md

      - name: Build
        run: yarn build
